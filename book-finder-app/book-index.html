<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Finder</title>
  <link rel="stylesheet" href="book-style.css" />
</head>

<body>

  <header>
    <h1>📚Book Finder</h1>
  </header>

  <main>

    <section class="search-section">

      <input
        type="text"
        id="searchInput"
        placeholder="Search for a book..."
      />

      <button id="searchBtn">
        Search
      </button>

    </section>

    <section id="loading" class="hidden">
      <div class="spinner"></div>
    </section>

    <section id="results">

    </section>

    <section id="errorMessage">

    </section>

  </main>

  <footer>
    <p>Created using Open Library API</p>
  </footer>

  <script src="book-script.js"></script>

</body>
</html>
